name: Android Release Build

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build Release APK
        uses: r0adkll/android-build-action@v2
        with:
          # Gradle task to assemble a signed release build
          gradle-task: "assembleRelease"
          # Path to the keystore file relative to the repository root
          keystore-path: "keystore.jks"
          # Keystore credentials (should be stored as secrets)
          keystore-password: ${{ secrets.KEYSTORE_PASSWORD }}
          keystore-alias: ${{ secrets.KEYSTORE_ALIAS }}
          key-password: ${{ secrets.KEY_PASSWORD }}

      - name: Upload Release APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/*.apk
